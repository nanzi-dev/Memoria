name: memoria

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memoria}
      POSTGRES_USER: ${POSTGRES_USER:-memoria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/docker/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_LIGHT_BASE_URL: ${LLM_LIGHT_BASE_URL:-}
      LLM_LIGHT_API_KEY: ${LLM_LIGHT_API_KEY:-}
      LLM_LIGHT_MODEL: ${LLM_LIGHT_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      LIGHT_TASK_MAX_OUTPUT_TOKENS: ${LIGHT_TASK_MAX_OUTPUT_TOKENS:-400}
      SPEECH_API_KEY: ${SPEECH_API_KEY:-}
      SPEECH_BASE_URL: ${SPEECH_BASE_URL:-https://api.openai.com/v1}
      SPEECH_STT_MODEL: ${SPEECH_STT_MODEL:-gpt-4o-mini-transcribe}
      SPEECH_TTS_MODEL: ${SPEECH_TTS_MODEL:-gpt-4o-mini-tts}
      SPEECH_OUTPUT_FORMAT: ${SPEECH_OUTPUT_FORMAT:-wav}
      SPEECH_STORAGE_PATH: ${SPEECH_STORAGE_PATH:-/app/data/speech}
      SPEECH_TIMEOUT_SECONDS: ${SPEECH_TIMEOUT_SECONDS:-30}
      SPEECH_STT_UPLOAD_MAX_BYTES: ${SPEECH_STT_UPLOAD_MAX_BYTES:-26214400}
      SPEECH_CUSTOM_VOICE_UPLOAD_MAX_BYTES: ${SPEECH_CUSTOM_VOICE_UPLOAD_MAX_BYTES:-10485760}
      SPEECH_CACHE_MAX_AGE_SECONDS: ${SPEECH_CACHE_MAX_AGE_SECONDS:-604800}
      SPEECH_CACHE_MAX_BYTES: ${SPEECH_CACHE_MAX_BYTES:-536870912}
      DATABASE_URL: postgresql://${POSTGRES_USER:-memoria}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/docker/.env}@postgres:5432/${POSTGRES_DB:-memoria}
      DATABASE_PATH: /app/data/sqlite_db/memoria.db
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:?Set ADMIN_BOOTSTRAP_TOKEN in deploy/docker/.env}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      SHORT_TERM_MEMORY_TURNS: ${SHORT_TERM_MEMORY_TURNS:-8}
      LONG_TERM_MEMORY_INTERVAL_TURNS: ${LONG_TERM_MEMORY_INTERVAL_TURNS:-5}
      MAX_OUTPUT_TOKENS: ${MAX_OUTPUT_TOKENS:-400}
      WORLD_CLOCK_DEFAULT_TIMEZONE: ${WORLD_CLOCK_DEFAULT_TIMEZONE:-UTC}
      WORLD_CLOCK_SCHEDULER_INTERVAL_SECONDS: ${WORLD_CLOCK_SCHEDULER_INTERVAL_SECONDS:-30}
      WORLD_CLOCK_SCHEDULER_LEASE_SECONDS: ${WORLD_CLOCK_SCHEDULER_LEASE_SECONDS:-90}
      VECTOR_DB_PATH: /app/data/chroma_db
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      VECTOR_SEARCH_TOP_K: ${VECTOR_SEARCH_TOP_K:-10}
      KNOWLEDGE_STORAGE_PATH: ${KNOWLEDGE_STORAGE_PATH:-/app/data/knowledge}
      KNOWLEDGE_QUERY_MAX_CHARS: ${KNOWLEDGE_QUERY_MAX_CHARS:-4000}
      KNOWLEDGE_RETRIEVAL_TOP_K: ${KNOWLEDGE_RETRIEVAL_TOP_K:-4}
      KNOWLEDGE_MAX_CHUNKS_PER_DOCUMENT: ${KNOWLEDGE_MAX_CHUNKS_PER_DOCUMENT:-3}
      KNOWLEDGE_SIMILARITY_THRESHOLD: ${KNOWLEDGE_SIMILARITY_THRESHOLD:-0.60}
      KNOWLEDGE_INJECTION_MAX_CHARS: ${KNOWLEDGE_INJECTION_MAX_CHARS:-4000}
      KNOWLEDGE_UPLOAD_MAX_BYTES: ${KNOWLEDGE_UPLOAD_MAX_BYTES:-10485760}
      KNOWLEDGE_PDF_MAX_PAGES: ${KNOWLEDGE_PDF_MAX_PAGES:-300}
      KNOWLEDGE_EXTRACT_MAX_CHARS: ${KNOWLEDGE_EXTRACT_MAX_CHARS:-1000000}
      KNOWLEDGE_CHUNK_TARGET_TOKENS: ${KNOWLEDGE_CHUNK_TARGET_TOKENS:-200}
      KNOWLEDGE_CHUNK_OVERLAP_TOKENS: ${KNOWLEDGE_CHUNK_OVERLAP_TOKENS:-36}
      KNOWLEDGE_CHUNK_MAX_TOKENS: ${KNOWLEDGE_CHUNK_MAX_TOKENS:-240}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - app_data:/app/data
      - model_cache:/root/.cache
      - ../../models:/app/models:ro
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/ready', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  postgres_data:
  app_data:
  model_cache:
